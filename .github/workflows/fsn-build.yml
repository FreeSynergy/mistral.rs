name: FSN Build & Publish

# CPU-only build. CUDA/Metal variants can be added later as separate jobs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binaries: "mistralrs-server"
            archive: mistral-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binaries: "mistralrs-server"
            archive: mistral-linux-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            binaries: "mistralrs-server"
            archive: mistral-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binaries: "mistralrs-server"
            archive: mistral-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binaries: "mistralrs-server.exe"
            archive: mistral-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev cmake \
            libssl-dev pkg-config libgomp1

      - name: Build (CPU only)
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p mistralrs-server \
            --no-default-features \
            --features "metal"
        env:
          MISTRALRS_NO_CUDA: "1"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binaries }} .
          tar czf ${{ matrix.archive }} ${{ matrix.binaries }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binaries }}" .
          Compress-Archive -Path ${{ matrix.binaries }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate fsn-package.toml
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          REPO="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > fsn-package.toml << EOF
          [package]
          id = "mistral"
          name = "Mistral.rs"
          version = "${VERSION}"
          category = "server"
          type = "app"
          description = "Blazing-fast LLM inference engine in Rust — CPU, Metal, CUDA"
          tags = ["llm", "ai", "inference", "synthesizer", "mistral", "local-ai"]
          icon = "mistral"
          upstream = "https://github.com/EricLBuehler/mistral.rs"

          [app]
          # CPU-only builds. CUDA/Metal GPU builds are separate releases.
          binaries = [
            { os = "linux",   arch = "x86_64",  url = "${REPO}/mistral-linux-x86_64.tar.gz" },
            { os = "linux",   arch = "aarch64", url = "${REPO}/mistral-linux-aarch64.tar.gz" },
            { os = "macos",   arch = "x86_64",  url = "${REPO}/mistral-macos-x86_64.tar.gz" },
            { os = "macos",   arch = "aarch64", url = "${REPO}/mistral-macos-aarch64.tar.gz" },
            { os = "windows", arch = "x86_64",  url = "${REPO}/mistral-windows-x86_64.zip" },
          ]
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}-cpu
          name: "Mistral.rs ${{ steps.ver.outputs.tag }} (CPU)"
          body: |
            CPU-only builds for Linux (x86_64, aarch64), macOS (x86_64, aarch64 with Metal), Windows (x86_64).
            GPU builds (CUDA) require separate compilation with GPU runners.
            LLM inference — upstream: https://github.com/EricLBuehler/mistral.rs
          files: |
            artifacts/*
            fsn-package.toml
